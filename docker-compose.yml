version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: campusflow_db
    environment:
      MYSQL_ROOT_PASSWORD: campusflow123
      MYSQL_DATABASE: campusflow
    ports:
      - "3307:3306"
    volumes:
      - campusflow_data:/var/lib/mysql
      - ./campusflow/databaseMysql_documented.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  campusflow_data:
